version: '3.8'

services:
  quorum-server:
    build:
      context: ./apps/quorum-server
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - DB_PATH=/data/quorum.db
      - PUBLIC_URL=${PUBLIC_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    volumes:
      - quorum-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  quorum-web:
    build:
      context: ./apps/quorum-web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - quorum-server
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./apps/telegram-bot
      dockerfile: Dockerfile
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - QUORUM_SERVER_URL=http://quorum-server:3001
      - BOT_SECRET=${JWT_SECRET}
    depends_on:
      - quorum-server
    restart: unless-stopped

volumes:
  quorum-data:
